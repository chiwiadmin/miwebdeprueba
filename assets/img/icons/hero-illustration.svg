<svg viewBox="0 0 560 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="heroIllustrationTitle">
  <title id="heroIllustrationTitle">Ilustración de infraestructura IT y ciberseguridad</title>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1a33" />
      <stop offset="100%" stop-color="#14335c" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="560" height="480" rx="28" fill="url(#bgGrad)" />

  <!-- orbit rings -->
  <circle cx="280" cy="230" r="170" fill="none" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 8" />
  <circle cx="280" cy="230" r="130" fill="none" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="2 7" />

  <!-- connection lines -->
  <g stroke="#60a5fa" stroke-opacity="0.55" stroke-width="1.5">
    <line x1="280" y1="230" x2="120" y2="130" />
    <line x1="280" y1="230" x2="440" y2="130" />
    <line x1="280" y1="230" x2="110" y2="330" />
    <line x1="280" y1="230" x2="450" y2="340" />
    <line x1="280" y1="230" x2="280" y2="90" />
  </g>

  <!-- server node -->
  <g transform="translate(76,100)">
    <rect x="0" y="0" width="88" height="60" rx="10" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5" />
    <circle cx="16" cy="18" r="4" fill="#60a5fa" />
    <circle cx="16" cy="32" r="4" fill="#3b82f6" />
    <line x1="30" y1="18" x2="72" y2="18" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" />
    <line x1="30" y1="32" x2="60" y2="32" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" />
    <line x1="30" y1="46" x2="66" y2="46" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- network node -->
  <g transform="translate(392,96)">
    <circle cx="24" cy="24" r="30" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5" />
    <circle cx="24" cy="14" r="4.5" fill="#60a5fa" />
    <circle cx="12" cy="32" r="4.5" fill="#3b82f6" />
    <circle cx="36" cy="32" r="4.5" fill="#3b82f6" />
    <line x1="24" y1="14" x2="12" y2="32" stroke="#60a5fa" stroke-width="1.5" />
    <line x1="24" y1="14" x2="36" y2="32" stroke="#60a5fa" stroke-width="1.5" />
    <line x1="12" y1="32" x2="36" y2="32" stroke="#60a5fa" stroke-width="1.5" />
  </g>

  <!-- cloud node -->
  <g transform="translate(58,296)">
    <path d="M14 40 a16 16 0 0 1 -2 -31.9 A20 20 0 0 1 51 8.5 A15 15 0 0 1 48 40 Z" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5" />
  </g>

  <!-- laptop / endpoint node -->
  <g transform="translate(392,300)">
    <rect x="0" y="0" width="70" height="46" rx="8" fill="#0f1f38" stroke="#3b82f6" stroke-width="1.5" />
    <rect x="10" y="10" width="50" height="26" rx="3" fill="none" stroke="#60a5fa" stroke-width="1.5" />
    <path d="M20 34 L50 34" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- central shield -->
  <g transform="translate(232,150)">
    <path d="M48 0 L92 16 V60 C92 96 68 118 48 128 C28 118 4 96 4 60 V16 Z" fill="url(#shieldGrad)" stroke="#0b1a33" stroke-width="2" />
    <path d="M30 62 L43 76 L68 44" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- floating dots -->
  <g fill="#93c5fd">
    <circle cx="130" cy="70" r="3" />
    <circle cx="452" cy="72" r="3" />
    <circle cx="90" cy="230" r="3" />
    <circle cx="478" cy="230" r="3" />
    <circle cx="280" cy="410" r="3" />
  </g>
</svg>

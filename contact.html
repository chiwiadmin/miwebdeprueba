<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contacto — Lulu & Pacho</title>
<meta name="description" content="Contactanos para reforzar tu equipo técnico con especialistas en IT y ciberseguridad." />
<link rel="icon" href="assets/img/logo.png" type="image/png" />
<link rel="stylesheet" href="assets/css/variables.css" />
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/responsive.css" />
<script>
  (function () {
    try {
      var stored = localStorage.getItem("lp-theme");
      var theme = stored || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    } catch (err) {}
  })();
</script>
</head>
<body data-page="contact">
<a class="skip-link" href="#main-content">Saltar al contenido principal</a>
<div id="site-header-mount"></div>

<main id="main-content">
  <header class="page-header">
    <div class="container">
      <span class="eyebrow" data-i18n="contact.hero.eyebrow">Contacto</span>
      <h1 data-i18n="contact.hero.title">Hablemos de tu proyecto</h1>
      <p data-i18n="contact.hero.description">Contanos brevemente qué necesitás y te respondemos a la brevedad.</p>
    </div>
  </header>

  <section>
    <div class="container">
      <div class="contact-card reveal">
        <form
          id="contact-form"
          novalidate
          data-i18n-attr="data-success-message:contact.form.successMessage,data-error-message:contact.form.errorMessage,data-error-required:contact.form.errorRequired"
        >
          <div class="form-group">
            <label for="contact-email" data-i18n="contact.form.emailLabel">Correo electrónico</label>
            <input
              id="contact-email"
              name="email"
              type="email"
              class="form-control"
              required
              autocomplete="email"
              placeholder="tu@empresa.com"
              data-i18n-attr="placeholder:contact.form.emailPlaceholder"
            />
          </div>

          <div class="form-group">
            <label for="contact-message" data-i18n="contact.form.messageLabel">Mensaje</label>
            <textarea
              id="contact-message"
              name="message"
              class="form-control"
              rows="4"
              required
              maxlength="50"
              placeholder="Contanos brevemente qué necesitás"
              data-i18n-attr="placeholder:contact.form.messagePlaceholder"
            ></textarea>
            <span class="form-hint" id="message-counter" aria-live="polite">50/50</span>
          </div>

          <button type="submit" class="btn btn-primary btn-block" data-i18n="contact.form.submit">Enviar mensaje</button>

          <p id="form-status" class="form-status" role="status" aria-live="polite"></p>
        </form>

        <div class="contact-note">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="flex-shrink:0;">
            <path d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z" />
          </svg>
          <p data-i18n="contact.note.text">
            Tu mensaje se envía de forma segura a nuestro equipo de contacto. No compartimos tu información con
            terceros.
          </p>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="site-footer-mount"></div>

<script src="assets/js/theme.js" defer></script>
<script src="assets/js/translations.js" defer></script>
<script src="assets/js/main.js" defer></script>
</body>
</html>
